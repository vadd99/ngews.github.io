<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Postingan - NGews Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #0a0712;
            --bg-surface: #120d24;
            --accent: #b493ff;
            --text-main: #f3f1f6;
            --text-muted: #9e97b2;
            --border-color: #231b3d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); padding-bottom: 60px; }

        .admin-container { max-width: 800px; margin: 40px auto; padding: 0 24px; }
        .form-card { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 16px; padding: 32px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full-width { grid-column: span 2; }
        
        input, select { background-color: var(--bg-base); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 8px; width: 100%; }
        
        .alert-box { padding: 16px; border-radius: 10px; margin-bottom: 20px; display: none; text-align: center; font-weight: 600; }
        .alert-success { background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; color: #10b981; }
        .alert-error { background: rgba(255, 107, 107, 0.2); border: 1px solid #ff6b6b; color: #ff6b6b; }
        
        .btn-submit { background: var(--accent); color: #0a0712; border: none; padding: 16px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .btn-toggle { background: none; border: none; color: var(--accent); cursor: pointer; text-align: left; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="alert-box alert-success" id="successAlert">✅ Video berhasil dipublikasikan!</div>
        <div class="alert-box alert-error" id="errorAlert">❌ Gagal mengupload data.</div>

        <div class="form-card">
            <form id="uploadForm">
                <div class="form-grid">
                    <div class="form-group full-width"><label>Judul Video</label><input type="text" id="inpTitle" required></div>
                    <div class="form-group"><label>URL Video</label><input type="url" id="inpVideoUrl" required></div>
                    <div class="form-group"><label>URL Thumbnail</label><input type="url" id="inpThumbnail" required></div>
                    
                    <div class="form-group">
                        <label>Kategori</label>
                        <select id="inpCategorySelect"><option value="">Pilih Kategori...</option></select>
                        <input type="text" id="inpCategoryManual" placeholder="Tulis kategori baru" style="display:none; margin-top:5px;">
                        <button type="button" class="btn-toggle" onclick="toggle('inpCategoryManual')">+ Tambah Kategori Baru</button>
                    </div>

                    <div class="form-group">
                        <label>Negara</label>
                        <select id="inpCountrySelect"><option value="">Pilih Negara...</option></select>
                        <input type="text" id="inpCountryManual" placeholder="Tulis negara baru" style="display:none; margin-top:5px;">
                        <button type="button" class="btn-toggle" onclick="toggle('inpCountryManual')">+ Tambah Negara Baru</button>
                    </div>

                    <div class="form-group">
                        <label>Channel</label>
                        <select id="inpChannelSelect" onchange="updateAvatar()"><option value="">Pilih Channel...</option></select>
                        <input type="text" id="inpChannelManual" placeholder="Nama channel baru" style="display:none; margin-top:5px;">
                        <button type="button" class="btn-toggle" onclick="toggle('inpChannelManual')">+ Channel Baru</button>
                    </div>

                    <div class="form-group"><label>URL Avatar</label><input type="url" id="inpAvatar"></div>

                    <div class="form-group full-width">
                        <label>Durasi Video</label>
                        <div style="display: flex; gap: 10px;">
                            <select id="durJam"></select>
                            <select id="durMenit"></select>
                            <select id="durDetik"></select>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label>Tags (Pilih yang sudah ada)</label>
                        <div id="tagsContainer" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
                        <input type="text" id="inpTagsManual" placeholder="Tambah tag baru (pisahkan koma)">
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="btnSubmit">Publikasikan Video</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyA8-TN3r2KNL-XEHZ5lF3-rkVyj2qQe9so",
            projectId: "ngews-web"
        }));

        let channelMap = {}; 
        window.toggle = (id) => document.getElementById(id).style.display = 'block';

        async function initForm() {
            for(let i=0; i<=5; i++) durJam.innerHTML += `<option value="${i}">${i} Jam</option>`;
            for(let i=0; i<60; i++) {
                durMenit.innerHTML += `<option value="${i}">${i.toString().padStart(2,'0')} Menit</option>`;
                durDetik.innerHTML += `<option value="${i}">${i.toString().padStart(2,'0')} Detik</option>`;
            }

            const snapshot = await getDocs(collection(db, "videos"));
            const cats = new Set(), counts = new Set(), tags = new Set();
            snapshot.forEach(doc => {
                const d = doc.data();
                if(d.category) cats.add(d.category);
                if(d.country) counts.add(d.country);
                if(d.tags) d.tags.forEach(t => tags.add(t));
                if(d.channel) channelMap[d.channel] = d.avatar || "";
            });

            cats.forEach(c => inpCategorySelect.innerHTML += `<option value="${c}">${c}</option>`);
            counts.forEach(c => inpCountrySelect.innerHTML += `<option value="${c}">${c}</option>`);
            Object.keys(channelMap).forEach(ch => inpChannelSelect.innerHTML += `<option value="${ch}">${ch}</option>`);
            tags.forEach(t => tagsContainer.innerHTML += `<label><input type="checkbox" class="tag-check" value="${t}"> ${t}</label>`);
        }

        window.updateAvatar = () => {
            const val = inpChannelSelect.value;
            if(val && channelMap[val]) inpAvatar.value = channelMap[val];
        };

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSubmit.disabled = true;

            try {
                const finalTags = Array.from(document.querySelectorAll('.tag-check:checked')).map(c => c.value);
                const extraTags = inpTagsManual.value.split(',').map(t => t.trim()).filter(t => t);
                
                await addDoc(collection(db, "videos"), {
                    title: inpTitle.value,
                    // KITA TAMBAHKAN KEMBALI DI SINI:
                    videoUrl: inpVideoUrl.value,
                    thumbnail: inpThumbnail.value,
                    category: inpCategoryManual.value || inpCategorySelect.value,
                    country: inpCountryManual.value || inpCountrySelect.value,
                    channel: inpChannelManual.value || inpChannelSelect.value,
                    avatar: inpAvatar.value,
                    duration: `${durJam.value}:${durMenit.value.padStart(2,'0')}:${durDetik.value.padStart(2,'0')}`,
                    tags: [...new Set([...finalTags, ...extraTags])],
                    views: 0, likes: 0, dislikes: 0, comments: [],
                    uploadDate: serverTimestamp()
                });

                successAlert.style.setProperty('display', 'flex', 'important');
                window.scrollTo(0,0);
                setTimeout(() => successAlert.style.display = 'none', 4000);
                uploadForm.reset();
            } catch (err) {
                errorAlert.textContent = "❌ Gagal: " + err.message;
                errorAlert.style.setProperty('display', 'flex', 'important');
            } finally { btnSubmit.disabled = false; }
        });

        initForm();
    </script>
</body>
</html>
