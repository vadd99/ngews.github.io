<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGews Console - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #0a0712;
            --bg-surface: #120d24;
            --bg-surface-hover: #1c1533;
            --accent: #b493ff;
            --text-main: #f3f1f6;
            --text-muted: #9e97b2;
            --border-color: #231b3d;
            --danger: #ff4757;
            --success: #2ed573;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); }

        /* HEADER SEDERHANA */
        header { 
            background-color: var(--bg-surface); border-bottom: 1px solid var(--border-color); 
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .brand { font-size: 1.5rem; font-weight: 800; color: var(--text-main); text-decoration: none; letter-spacing: -0.5px;}
        .brand span { color: var(--accent); }
        .link-website { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 6px;}
        .link-website:hover { color: var(--accent); }

        /* MAIN CONTENT */
        main { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 1.8rem; font-weight: 700; }
        .btn-primary { background-color: var(--accent); color: #0a0712; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-primary:hover { box-shadow: 0 4px 15px rgba(180, 147, 255, 0.3); transform: translateY(-2px); }

        /* STATS CARD */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background-color: var(--bg-surface); border: 1px solid var(--border-color); padding: 24px; border-radius: 16px; display: flex; flex-direction: column; gap: 8px; }
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--text-main); }
        .stat-label { color: var(--text-muted); font-size: 0.9rem; font-weight: 600; }

        /* TABLE STYLES */
        .table-container { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 16px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 16px 24px; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; border-bottom: 1px solid var(--border-color); text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 16px 24px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: var(--bg-surface-hover); }

        /* VIDEO CELL INFO */
        .cell-video { display: flex; align-items: center; gap: 16px; }
        .cell-thumb { width: 120px; height: 68px; border-radius: 8px; object-fit: cover; background: #000; border: 1px solid var(--border-color); }
        .cell-title { font-weight: 600; color: var(--text-main); margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; max-width: 250px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; background: rgba(180, 147, 255, 0.1); color: var(--accent); }

        /* ACTION BUTTONS */
        .action-btns { display: flex; gap: 10px; }
        .btn-action { background: none; border: none; cursor: pointer; padding: 8px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-edit { color: var(--text-muted); background: rgba(255,255,255,0.05); }
        .btn-edit:hover { color: var(--text-main); background: var(--accent); }
        .btn-delete { color: var(--danger); background: rgba(255, 71, 87, 0.1); }
        .btn-delete:hover { background: var(--danger); color: #fff; }

        /* MODAL EDIT */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10, 7, 18, 0.8); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-box { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 16px; width: 100%; max-width: 500px; padding: 32px; transform: translateY(20px); transition: 0.3s; }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-title { font-size: 1.2rem; font-weight: 700; }
        .btn-close { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        .btn-close:hover { color: var(--danger); }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        .form-group input { background: var(--bg-base); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 8px; outline: none; }
        .form-group input:focus { border-color: var(--accent); }
        .btn-save { background: var(--accent); color: #0a0712; border: none; width: 100%; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        @media (max-width: 768px) {
            header { padding: 16px 20px; }
            main { padding: 20px; }
            .header-top { flex-direction: column; gap: 15px; align-items: flex-start; }
            td, th { padding: 12px 16px; }
        }
    </style>
</head>
<body>

    <!-- HEADER BARU (Simpel & Elegan) -->
    <header>
        <a href="index.html" class="brand">NGews <span>Console</span></a>
        <a href="index.html" class="link-website">
            Lihat Website
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
        </a>
    </header>

    <!-- KONTEN UTAMA -->
    <main>
        <div class="header-top">
            <h1 class="page-title">Kelola Postingan</h1>
            <!-- TOMBOL MENUJU HALAMAN UPLOAD -->
            <a href="post.html" class="btn-primary">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
                Buat Postingan Baru
            </a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Total Video Publik</span>
                <span class="stat-value" id="totalVideos">0</span>
            </div>
        </div>

        <!-- TABEL DATA POSTINGAN -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Video Info</th>
                        <th>Kategori</th>
                        <th>Channel</th>
                        <th>Tanggal Upload</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" style="text-align: center; padding: 40px; color: var(--text-muted);">Memuat data dari database...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- MODAL EDIT POSTINGAN -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2 class="modal-title">Edit Postingan</h2>
                <button class="btn-close" onclick="closeModal()">×</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Judul Video</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label>URL Video</label>
                    <input type="url" id="editVideoUrl" required>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <input type="text" id="editCategory" required>
                </div>
                <button type="submit" class="btn-save" id="btnSaveEdit">Simpan Perubahan</button>
            </form>
        </div>
    </div>

    <!-- SCRIPT FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyA8-TN3r2KNL-XEHZ5lF3-rkVyj2qQe9so",
            authDomain: "ngews-web.firebaseapp.com",
            projectId: "ngews-web",
            storageBucket: "ngews-web.firebasestorage.app",
            messagingSenderId: "1952425136",
            appId: "1:1952425136:web:3267816a6b05772d688775"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const tableBody = document.getElementById('tableBody');
        const totalVideosEl = document.getElementById('totalVideos');
        const editModal = document.getElementById('editModal');
        const editForm = document.getElementById('editForm');
        let currentVideos = []; 

        async function loadConsoleData() {
            try {
                const querySnapshot = await getDocs(collection(db, "videos"));
                tableBody.innerHTML = ''; 
                currentVideos = [];

                if (querySnapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Belum ada video.</td></tr>';
                    totalVideosEl.textContent = "0";
                    return;
                }

                totalVideosEl.textContent = querySnapshot.size;

                querySnapshot.forEach((doc) => {
                    const d = doc.data();
                    d.id = doc.id; 
                    currentVideos.push(d);
                    
                    let tglStr = "Tidak diketahui";
                    if (d.uploadDate && d.uploadDate.toDate) {
                        tglStr = d.uploadDate.toDate().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                    }

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>
                            <div class="cell-video">
                                <img src="${d.thumbnail}" class="cell-thumb">
                                <div>
                                    <div class="cell-title">${d.title || 'Tanpa Judul'}</div>
                                    <span style="font-size: 0.8rem; color: var(--text-muted);">Durasi: ${d.duration || '-'}</span>
                                </div>
                            </div>
                        </td>
                        <td><span class="badge">${d.category || 'Lainnya'}</span></td>
                        <td><span style="font-size: 0.9rem; font-weight: 600;">${d.channel || 'Anonim'}</span></td>
                        <td><span style="font-size: 0.9rem; color: var(--text-muted);">${tglStr}</span></td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-action btn-edit" data-id="${d.id}" title="Edit Data">
                                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                </button>
                                <button class="btn-action btn-delete" data-id="${d.id}" title="Hapus Video">
                                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>
                                </button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });

                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', (e) => hapusVideo(e.currentTarget.getAttribute('data-id')));
                });
                document.querySelectorAll('.btn-edit').forEach(btn => {
                    btn.addEventListener('click', (e) => bukaModalEdit(e.currentTarget.getAttribute('data-id')));
                });

            } catch (err) {
                console.error("Gagal memuat data console:", err);
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; color: var(--danger);">Gagal mengambil data database.</td></tr>';
            }
        }

        async function hapusVideo(id) {
            const konfirmasi = confirm("⚠️ PERINGATAN: Apakah kamu yakin ingin menghapus video ini secara permanen?");
            if (konfirmasi) {
                try {
                    await deleteDoc(doc(db, "videos", id));
                    alert("✅ Video berhasil dihapus!");
                    loadConsoleData(); 
                } catch (err) {
                    alert("❌ Gagal menghapus: " + err.message);
                }
            }
        }

        window.closeModal = () => { editModal.classList.remove('active'); }
        
        function bukaModalEdit(id) {
            const videoData = currentVideos.find(v => v.id === id);
            if(videoData) {
                document.getElementById('editId').value = videoData.id;
                document.getElementById('editTitle').value = videoData.title;
                document.getElementById('editVideoUrl').value = videoData.videoUrl;
                document.getElementById('editCategory').value = videoData.category;
                editModal.classList.add('active'); 
            }
        }

        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSaveEdit');
            btn.disabled = true; btn.textContent = "Menyimpan...";

            const idDoc = document.getElementById('editId').value;
            try {
                await updateDoc(doc(db, "videos", idDoc), {
                    title: document.getElementById('editTitle').value,
                    videoUrl: document.getElementById('editVideoUrl').value,
                    category: document.getElementById('editCategory').value
                });
                
                alert("✅ Perubahan berhasil disimpan!");
                closeModal();
                loadConsoleData(); 
            } catch (err) {
                alert("❌ Gagal update: " + err.message);
            } finally {
                btn.disabled = false; btn.textContent = "Simpan Perubahan";
            }
        });

        loadConsoleData();
    </script>
</body>
</html>
