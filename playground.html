<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Video - NGews</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS RESET & VARIABLES */
        :root {
            --bg-base: #0a0712;
            --bg-surface: #120d24;
            --bg-surface-hover: #1c1533;
            --accent: #b493ff;
            --accent-glow: rgba(180, 147, 255, 0.3);
            --text-main: #f3f1f6;
            --text-muted: #9e97b2;
            --border-color: #231b3d;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-base); color: var(--text-main); overflow-x: hidden; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* HEADER */
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background-color: rgba(10, 7, 18, 0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color); display: flex; align-items: center;
            justify-content: space-between; padding: 0 24px; z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }
        .menu-toggle {
            background: none; border: none; color: var(--text-main); cursor: pointer;
            display: flex; align-items: center; justify-content: center; padding: 8px; border-radius: 50%; transition: var(--transition);
        }
        .menu-toggle:hover { background-color: var(--bg-surface-hover); color: var(--accent); }
        
        .logo { display: flex; align-items: center; font-weight: 700; font-size: 1.5rem; letter-spacing: -0.5px; color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }
        
        .header-right { display: flex; align-items: center; }

        /* EXPANDABLE SEARCH */
        .expandable-search { position: relative; display: flex; align-items: center; justify-content: flex-end; height: 44px; }
        .search-input-expanding {
            position: absolute; right: 0; width: 0; height: 100%; opacity: 0; padding: 0;
            border: 1px solid transparent; border-radius: 50px; background-color: var(--bg-surface);
            color: var(--text-main); font-size: 0.95rem; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, padding 0.4s ease; outline: none;
        }
        .expandable-search.active .search-input-expanding { width: 320px; opacity: 1; padding: 10px 45px 10px 20px; border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .search-icon-btn { background: none; border: none; color: var(--accent); cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; transition: var(--transition); }
        .search-icon-btn:hover { background-color: rgba(180, 147, 255, 0.15); }

        /* WATCH PAGE LAYOUT */
        .watch-container {
            display: flex; flex-direction: column; padding: 100px 24px 40px;
            max-width: 1200px; margin: 0 auto; min-height: 100vh;
        }

        /* BREADCRUMB */
        .breadcrumb { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .breadcrumb a { color: var(--text-muted); text-decoration: none; transition: var(--transition); }
        .breadcrumb a:hover { color: var(--accent); }

        /* PLAYER WRAPPER */
        .player-wrapper {
            width: 100%; background-color: #000; border-radius: 16px; overflow: hidden; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); aspect-ratio: 16 / 9; border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        
        .player-wrapper:fullscreen {
            border-radius: 0; border: none; aspect-ratio: auto; width: 100vw; height: 100vh;
        }

        /* TAMPILAN ICON STATE TENGAH PROFESIONAL */
        .center-state-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1);
            z-index: 9; color: #ffffff; background: rgba(0, 0, 0, 0.6); padding: 20px; border-radius: 50%;
            opacity: 0; pointer-events: none; transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }
        .center-state-icon.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; cursor: pointer; }
        
        @keyframes iconFlicker {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            80% { opacity: 0.8; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); }
        }
        .center-state-icon.animate { animation: iconFlicker 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }

        /* KONTROL PLAYER BAWAH CUSTOM */
        .player-controls {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 20px 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); z-index: 3; display: flex; flex-direction: column; gap: 12px;
            opacity: 0; transform: translateY(10px); transition: var(--transition);
        }
        .player-wrapper:hover .player-controls, .player-wrapper.playing .player-controls { opacity: 1; transform: translateY(0); }

        .timeline-container { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; position: relative; }
        .timeline-progress { position: absolute; top: 0; left: 0; height: 100%; background-color: var(--accent); border-radius: 2px; width: 0%; box-shadow: 0 0 10px var(--accent-glow); }
        .controls-row { display: flex; justify-content: space-between; align-items: center; }
        .controls-left, .controls-right { display: flex; align-items: center; gap: 16px; color: var(--text-main); }
        .control-btn { background: none; border: none; color: var(--text-main); cursor: pointer; display: flex; align-items: center; transition: var(--transition); }
        .control-btn:hover { color: var(--accent); }
        .time-display { font-size: 0.85rem; font-weight: 500; }

        /* RIPPLE DOUBLE TAP EFFECT */
        .double-tap-ripple {
            position: absolute; top: 0; width: 50%; height: 100%; z-index: 7;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; opacity: 0;
        }
        .double-tap-ripple.left { left: 0; background: linear-gradient(to right, rgba(255,255,255,0.06), transparent); }
        .double-tap-ripple.right { right: 0; background: linear-gradient(to left, rgba(255,255,255,0.06), transparent); }
        .double-tap-ripple.animate { animation: rippleFade 0.5s ease; }
        @keyframes rippleFade { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        .double-tap-ripple svg { width: 40px; height: 40px; fill: none; stroke: #ffffff; stroke-width: 2; }

        /* INFO SEKSI UTAMA (JUDUL DI BAWAH VIDEO) */
        .video-main-details { margin-bottom: 20px; }
        .video-title { font-size: 1.5rem; font-weight: 700; line-height: 1.35; color: var(--text-main); letter-spacing: -0.3px; margin-bottom: 14px; }

        /* CREATOR SECTOR MODERN & GROUPED CONTROLS */
        .creator-row-container {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 16px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        
        .creator-left-side { display: flex; align-items: center; gap: 14px; }
        .creator-avatar-container { position: relative; }
        .creator-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color); }
        .creator-status { position: absolute; bottom: 1px; right: 1px; width: 9px; height: 9px; border-radius: 50%; background-color: #10b981; border: 2px solid var(--bg-base); }
        
        .creator-meta-block { display: flex; flex-direction: column; gap: 2px; }
        .creator-name-wrapper { display: flex; align-items: center; gap: 10px; }
        .creator-name { font-weight: 600; font-size: 0.98rem; color: var(--text-main); display: flex; align-items: center; gap: 4px; }
        .creator-verified { color: var(--accent); display: inline-flex; }
        .creator-subs { font-size: 0.78rem; color: var(--text-muted); }

        /* MINI COMPACT FOLLOW BUTTON */
        .btn-follow {
            background-color: rgba(180, 147, 255, 0.15); border: 1px solid rgba(180, 147, 255, 0.3);
            color: var(--accent); font-weight: 600; font-size: 0.78rem; padding: 4px 12px;
            border-radius: 6px; cursor: pointer; transition: var(--transition);
        }
        .btn-follow:hover { background-color: var(--accent); color: #0a0712; box-shadow: 0 0 10px var(--accent-glow); }

        /* ACTION BAR MODERN (LIKE, DISLIKE, SAVE) */
        .actions-right-side { display: flex; align-items: center; gap: 12px; }
        
        .interaction-pill-group {
            display: flex; align-items: center; background-color: var(--bg-surface);
            border: 1px solid var(--border-color); border-radius: 50px; overflow: hidden;
        }
        
        .action-icon-btn {
            background: none; border: none; color: var(--text-main); padding: 10px 16px;
            font-size: 0.88rem; font-weight: 600; display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: var(--transition); position: relative;
        }
        .action-icon-btn:hover { background-color: var(--bg-surface-hover); color: var(--accent); }
        .action-icon-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.2s; }
        .action-icon-btn:active svg { transform: scale(0.85); }
        
        .pill-divider { width: 1px; height: 20px; background-color: var(--border-color); }
        .action-icon-btn.active { color: var(--accent); background-color: rgba(180, 147, 255, 0.1); }
        .action-icon-btn.active svg { fill: var(--accent); }

        /* COMPACT DISCUSSION & COMMENTS SECTION */
        .comments-section {
            margin-bottom: 48px; background-color: rgba(18, 13, 36, 0.4);
            border: 1px solid var(--border-color); border-radius: 16px; padding: 20px;
        }
        .comments-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .comments-title { font-size: 1.1rem; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .comments-count-badge { background-color: var(--bg-surface-hover); color: var(--accent); padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; border: 1px solid var(--border-color); }
        
        .comment-input-area { display: flex; gap: 12px; margin-bottom: 24px; align-items: flex-start; }
        .user-avatar-current { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--border-color); }
        .comment-form { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; }
        .comment-textarea-wrapper { position: relative; border-radius: 10px; background-color: var(--bg-surface); border: 1px solid var(--border-color); transition: var(--transition); }
        .comment-textarea-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 10px rgba(180, 147, 255, 0.15); }
        .comment-textarea { width: 100%; min-height: 44px; max-height: 120px; background: transparent; border: none; color: var(--text-main); padding: 12px 16px; font-size: 0.9rem; resize: vertical; outline: none; }
        
        .comment-actions-bar { display: flex; justify-content: flex-end; gap: 10px; height: 0; overflow: hidden; opacity: 0; transition: var(--transition); }
        .comment-form.active .comment-actions-bar { height: 36px; opacity: 1; }
        .btn-comment-cancel { background: none; border: none; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; cursor: pointer; padding: 0 12px; border-radius: 6px; transition: var(--transition); }
        .btn-comment-cancel:hover { color: var(--text-main); background-color: var(--bg-surface-hover); }
        .btn-comment-submit { background-color: var(--accent); color: #0a0712; border: none; font-size: 0.85rem; font-weight: 700; cursor: pointer; padding: 0 16px; border-radius: 6px; transition: var(--transition); }
        
        .comments-list { display: flex; flex-direction: column; gap: 18px; max-height: 380px; overflow-y: auto; padding-right: 6px; }
        .comment-item { display: flex; gap: 12px; align-items: flex-start; padding-bottom: 14px; border-bottom: 1px solid rgba(35, 27, 61, 0.4); }
        .comment-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
        .comment-content { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; }
        .comment-user-meta { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .comment-username { font-weight: 600; color: var(--text-main); }
        .comment-badge { font-size: 0.7rem; background-color: rgba(180, 147, 255, 0.15); color: var(--accent); padding: 1px 6px; border-radius: 4px; font-weight: 500; }
        .comment-time { color: var(--text-muted); font-size: 0.75rem; }
        .comment-text { font-size: 0.9rem; color: #dfdaec; line-height: 1.45; word-break: break-word; }
        .comment-item-actions { display: flex; align-items: center; gap: 14px; margin-top: 4px; }
        .comment-action-btn { background: none; border: none; color: var(--text-muted); font-size: 0.75rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; }

        /* RELATED VIDEOS GRID */
        .related-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
        .related-title::before { content: ''; display: inline-block; width: 4px; height: 24px; background-color: var(--accent); border-radius: 2px; }
        #relatedVideosContainer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
        
        .related-card { background-color: var(--bg-surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); transition: var(--transition); cursor: pointer; display: flex; flex-direction: column; }
        .related-card:hover { transform: translateY(-4px); border-color: rgba(180, 147, 255, 0.4); box-shadow: 0 10px 25px rgba(10, 7, 18, 0.5); }
        .related-thumb-container { position: relative; width: 100%; padding-top: 56.25%; background-color: #1a1530; overflow: hidden; }
        .related-thumb { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .related-duration { position: absolute; bottom: 8px; right: 8px; background: rgba(10, 7, 18, 0.85); color: var(--text-main); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .related-info { padding: 14px; display: flex; flex-direction: column; }
        .related-video-title { font-size: 0.95rem; font-weight: 600; line-height: 1.35; color: var(--text-main); margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .related-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 8px; align-items: center; }

        .load-more-container { display: flex; justify-content: center; margin-top: 10px; margin-bottom: 60px; }
        .btn-load-more { background-color: transparent; border: 1px solid var(--border-color); color: var(--accent); padding: 14px 36px; border-radius: 50px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: var(--transition); }
        .btn-load-more:hover { border-color: var(--accent); color: var(--text-main); background-color: rgba(180, 147, 255, 0.1); }

        footer { border-top: 1px solid var(--border-color); padding: 40px 0; margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 20px; text-align: center; }
        .footer-links { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
        .footer-links a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; transition: var(--transition); }
        .footer-links a:hover { color: var(--accent); }
        .copyright { font-size: 0.8rem; color: var(--text-muted); }

        .nav-drawer { position: fixed; top: 70px; left: -300px; bottom: 0; width: 260px; background-color: var(--bg-surface); border-right: 1px solid var(--border-color); z-index: 90; transition: var(--transition); padding: 24px 16px; overflow-y: auto; }
        .nav-drawer.active { left: 0; }
        .drawer-overlay { position: fixed; top: 70px; left: 0; right: 0; bottom: 0; background: rgba(10,7,18,0.7); z-index: 89; backdrop-filter: blur(4px); display: none; opacity: 0; }
        .drawer-overlay.active { display: block; opacity: 1; }

        @media (max-width: 1024px) {
            #relatedVideosContainer { grid-template-columns: repeat(3, 1fr); }
        }
        
        /* ADJUSTMENT KHUSUS MOBILE (HP) agar FULL-WIDTH */
        @media (max-width: 768px) {
            .player-wrapper { border-radius: 0; margin: 0 -24px 16px; width: calc(100% + 48px); }
            .watch-container { padding: 94px 24px 16px; }
            #relatedVideosContainer { grid-template-columns: repeat(2, 1fr); gap: 14px; }
            
            .creator-row-container { flex-direction: column; align-items: flex-start; gap: 16px; }
            
            /* Sisi kanan (Action bar) meregang penuh mengisi layar HP */
            .actions-right-side { width: 100%; }
            
            /* Kontainer pill dibentuk flex lebar penuh */
            .interaction-pill-group { width: 100%; display: flex; }
            
            /* Tiap tombol membagi porsi flex secara merata dan teks sejajar tengah */
            .action-icon-btn { flex: 1; justify-content: center; padding: 12px 0; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="header-left">
            <button class="menu-toggle" id="menuToggleBtn" aria-label="Toggle Navigation">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <a href="index.html" class="logo">NG<span>ews</span></a>
        </div>
        <div class="header-right">
            <div class="expandable-search" id="expandableSearch">
                <input type="text" class="search-input-expanding" id="searchInput" placeholder="Cari aset video...">
                <button class="search-icon-btn" id="searchToggleBtn" aria-label="Cari">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="nav-drawer" id="navDrawer">
        <p class="sidebar-title">Menu Utama</p>
        <ul class="sidebar-menu">
            <li class="sidebar-item"><a href="index.html">Beranda</a></li>
            <li class="sidebar-item"><a href="#">Koleksi Saya</a></li>
        </ul>
    </aside>

    <!-- WATCH LAYOUT -->
    <div class="watch-container">
        
        <div class="breadcrumb">
            <a href="index.html">Beranda</a> <span>/</span> <a href="#" id="breadcrumbCategory">Kategori</a> <span>/</span> <span>Nonton</span>
        </div>

        <!-- VIDEO PLAYER -->
        <div class="player-wrapper" id="videoPlayerWrapper">
            <div id="playerContainer" style="width: 100%; height: 100%;"></div>
            
            <div class="double-tap-ripple left" id="rippleLeft">
                <svg viewBox="0 0 24 24"><path d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
            </div>
            <div class="double-tap-ripple right" id="rippleRight">
                <svg viewBox="0 0 24 24"><path d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
            </div>

            <div class="center-state-icon" id="centerStateIcon"></div>

            <!-- Kontrol Player Bawah Custom -->
            <div class="player-controls">
                <div class="timeline-container" id="timelineContainer">
                    <div class="timeline-progress" id="timelineProgress"></div>
                </div>
                <div class="controls-row">
                    <div class="controls-left">
                        <button class="control-btn" id="bottomPlayBtn">
                            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24" id="bottomPlayIcon"><path d="M8 5v14l11-7z"></path></svg>
                        </button>
                        <button class="control-btn" aria-label="Volume" id="volumeBtn">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="volumeIcon">
                                <path d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a8 8 0 010 11.9M11 5L6 9H2v6h4l5 4V5z"></path>
                            </svg>
                        </button>
                        <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
                    </div>
                    <div class="controls-right">
                        <span style="font-size: 0.8rem; font-weight: 600; margin-right: 8px;">1080p</span>
                        <button class="control-btn" aria-label="Fullscreen" id="customFullscreenBtn">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- DETAIL UTAMA: JUDUL VIDEO DI BAWAH PLAYER -->
        <div class="video-main-details">
            <h1 class="video-title">Memuat Judul Video...</h1>
        </div>

        <!-- PROFILE CREATOR & ACTION BAR (LIKE, DISLIKE, SAVE) -->
        <div class="creator-row-container">
            <!-- Sisi Kiri: Profil Pembuat Konten & Tombol Ikuti Sejajar -->
            <div class="creator-left-side">
                <div class="creator-avatar-container">
                    <img class="creator-avatar" src="" alt="Avatar" id="creatorAvatar">
                    <div class="creator-status"></div>
                </div>
                <div class="creator-meta-block">
                    <div class="creator-name-wrapper">
                        <span class="creator-name" id="creatorName">Nama Saluran</span>
                        <button class="btn-follow" id="followBtn">Ikuti</button>
                    </div>
                    <span class="creator-subs" id="videoViewsCount">0x ditonton</span>
                </div>
            </div>

            <!-- Sisi Kanan: Bar Aksi Pill Premium (Full Width di HP) -->
            <div class="actions-right-side">
                <div class="interaction-pill-group">
                    <!-- Tombol Like -->
                    <button class="action-icon-btn" id="likeBtn" aria-label="Suka Video">
                        <svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3zM7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"></path></svg>
                        <span id="likeCount">0</span>
                    </button>
                    <div class="pill-divider"></div>
                    <!-- Tombol Dislike -->
                    <button class="action-icon-btn" id="dislikeBtn" aria-label="Tidak Suka Video">
                        <svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3zm12-13h3a2 2 0 012 2v7a2 2 0 01-2 2h-3"></path></svg>
                    </button>
                    <div class="pill-divider"></div>
                    <!-- Tombol Bookmark Simpan Ke Koleksi -->
                    <button class="action-icon-btn" id="saveCollectionBtn" aria-label="Simpan Video">
                        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"></path></svg>
                        <span>Simpan</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- COMMENTS DISCUSSION -->
        <section class="comments-section">
            <div class="comments-header"><h3 class="comments-title">Diskusi <span class="comments-count-badge" id="commentCount">0</span></h3></div>
            <div class="comment-input-area">
                <img class="user-avatar-current" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80">
                <div class="comment-form" id="commentForm">
                    <div class="comment-textarea-wrapper"><textarea class="comment-textarea" id="commentInput" placeholder="Tulis komentar publik..."></textarea></div>
                    <div class="comment-actions-bar">
                        <button class="btn-comment-cancel" id="commentCancelBtn" type="button">Batal</button>
                        <button class="btn-comment-submit" id="commentSubmitBtn" type="button">Kirim</button>
                    </div>
                </div>
            </div>
            <div class="comments-list" id="commentsList"></div>
        </section>

        <h3 class="related-title">Video Serupa untuk Anda</h3>
        <div id="relatedVideosContainer"></div>
    </div>

    <!-- SCRIPT FIREBASE SECARA MODULAR -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Configuration Berdasarkan Data Akun Anda
        const firebaseConfig = {
            apiKey: "AIzaSyA8-TN3r2KNL-XEHZ5lF3-rkVyj2qQe9so",
            authDomain: "ngews-web.firebaseapp.com",
            projectId: "ngews-web",
            storageBucket: "ngews-web.firebasestorage.app",
            messagingSenderId: "1952425136",
            appId: "1:1952425136:web:3267816a6b05772d688775"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Ambil String ID langsung dari Parameter URL (Aman untuk string maupun number)
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');

        const videoTitleEl = document.querySelector('.video-title');
        const creatorNameEl = document.getElementById('creatorName');
        const creatorAvatarEl = document.getElementById('creatorAvatar');
        const videoViewsCountEl = document.getElementById('videoViewsCount');
        const breadcrumbCategory = document.getElementById('breadcrumbCategory');
        const relatedContainer = document.getElementById('relatedVideosContainer');
        const commentCountBadge = document.getElementById('commentCount');
        const commentsList = document.getElementById('commentsList');
        
        const playerContainer = document.getElementById('playerContainer');
        const videoPlayerWrapper = document.getElementById('videoPlayerWrapper');
        const bottomPlayBtn = document.getElementById('bottomPlayBtn');
        const bottomPlayIcon = document.getElementById('bottomPlayIcon');
        const timelineProgress = document.getElementById('timelineProgress');
        const timeDisplay = document.getElementById('timeDisplay');
        const timelineContainer = document.getElementById('timelineContainer');
        const customFullscreenBtn = document.getElementById('customFullscreenBtn');
        const volumeBtn = document.getElementById('volumeBtn');
        const volumeIcon = document.getElementById('volumeIcon');
        const centerStateIcon = document.getElementById('centerStateIcon');
        const rippleLeft = document.getElementById('rippleLeft');
        const rippleRight = document.getElementById('rippleRight');

        let allVideos = [];
        const playSVG = `<path d="M8 5v14l11-7z"></path>`;
        const pauseSVG = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>`;
        const soundOnSVG = `<path d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a8 8 0 010 11.9M11 5L6 9H2v6h4l5 4V5z"></path>`;
        const soundMutedSVG = `<path d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6m0-6l6 6"></path>`;

        // FORMAT TANGGAL UPLOAD AMAN
        function formatWaktuUpload(tanggalUpload) {
            if (!tanggalUpload) return 'Baru saja';
            const sekarang = new Date();
            const selisihDetik = Math.floor((sekarang - tanggalUpload) / 1000);
            if (selisihDetik < 60) return 'Baru saja';
            const selisihMenit = Math.floor(selisihDetik / 60);
            if (selisihMenit < 60) return `${selisihMenit} menit yang lalu`;
            const selisihJam = Math.floor(selisihMenit / 60);
            if (selisihJam < 24) return `${selisihJam} jam yang lalu`;
            const selisihHari = Math.floor(selisihJam / 24);
            if (selisihHari < 7) return `${selisihHari} hari yang lalu`;
            return tanggalUpload.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        async function muatHalamanVideo() {
            try {
                // 1. Ambil data spesifik video dari Firestore
                const docRef = doc(db, "videos", videoId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const videoData = docSnap.data();
                    
                    // Render UI Info Video
                    videoTitleEl.textContent = videoData.title || "Tanpa Judul";
                    breadcrumbCategory.textContent = videoData.category || "Berita";
                    creatorAvatarEl.src = videoData.avatar || "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde";
                    
                    const tglUpload = videoData.uploadDate ? videoData.uploadDate.toDate() : new Date();
                    const formattedViews = parseFloat(videoData.views || 0).toLocaleString('id-ID');
                    videoViewsCountEl.textContent = `${formattedViews} ditonton • ${formatWaktuUpload(tglUpload)}`;
                    
                    creatorNameEl.innerHTML = `${videoData.channel || 'Unknown'} <span class="creator-verified"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"></path></svg></span>`;
                    
                    document.getElementById('likeCount').textContent = parseFloat(videoData.likes || 0).toLocaleString('id-ID');
                    
                    // Render Komentar yang tersimpan di Firestore
                    const commentsArray = videoData.comments || [];
                    commentCountBadge.textContent = commentsArray.length;
                    commentsList.innerHTML = '';
                    commentsArray.forEach(comment => {
                        const item = document.createElement('div');
                        item.className = 'comment-item';
                        item.innerHTML = `
                            <img class="comment-avatar" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80">
                            <div class="comment-content">
                                <div class="comment-user-meta"><span class="comment-username">Anonim</span></div>
                                <p class="comment-text">${comment}</p>
                            </div>
                        `;
                        commentsList.appendChild(item);
                    });

                    playerContainer.innerHTML = '';

                    // Deteksi Embed Player Drive/DoodStream
                    if (videoData.videoUrl.includes('drive.google.com') || videoData.videoUrl.includes('dood') || videoData.videoUrl.includes('dropbox.com') === false && videoData.videoUrl.match(/\.(mp4|webm|ogg)$/i) === null) {
                        const iframe = document.createElement('iframe');
                        iframe.src = videoData.videoUrl;
                        iframe.style.width = '100%'; iframe.style.height = '100%'; iframe.style.border = 'none';
                        iframe.setAttribute('allow', 'autoplay'); iframe.setAttribute('allowfullscreen', 'true');
                        playerContainer.appendChild(iframe);
                        
                        document.querySelector('.player-controls').style.display = 'none';
                        centerStateIcon.style.display = 'none';
                    } else {
                        // Player HTML5 Custom bawaan
                        const video = document.createElement('video');
                        video.id = 'mainVideoPlayer';
                        video.src = videoData.videoUrl;
                        video.poster = videoData.thumbnail;
                        video.style.width = '100%'; video.style.height = '100%';
                        video.style.objectFit = 'contain'; video.style.backgroundColor = '#000000';
                        video.style.display = 'block';
                        playerContainer.appendChild(video);
                        
                        document.querySelector('.player-controls').style.display = 'flex';
                        window.globalVideoPlayer = video;
                        inisialisasiKontrolVideo();
                    }
                } else {
                    videoTitleEl.textContent = "Video tidak ditemukan di Cloud Database.";
                }

                // 2. Ambil semua list videos untuk seksi "Video Serupa" di bawah
                const listSnapshot = await getDocs(collection(db, "videos"));
                allVideos = [];
                listSnapshot.forEach((doc) => {
                    const d = doc.data();
                    allVideos.push({
                        id: doc.id,
                        title: d.title || "Tanpa Judul",
                        thumbnail: d.thumbnail || "",
                        category: d.category || "Berita",
                        duration: d.duration || "00:00",
                        uploadDate: d.uploadDate ? d.uploadDate.toDate() : new Date()
                    });
                });

                // Tampilkan video serupa (saring video yang sedang ditonton saat ini)
                renderVideos(allVideos.filter(v => v.id !== videoId));

            } catch (error) {
                console.error("Gagal memuat data video dari Firebase Firestore:", error);
            }
        }

        function inisialisasiKontrolVideo() {
            const activePlayer = window.globalVideoPlayer;
            if (!activePlayer) return;

            centerStateIcon.innerHTML = `<svg width="40" height="40" fill="currentColor" viewBox="0 0 24 24">${playSVG}</svg>`;
            centerStateIcon.className = 'center-state-icon visible';

            function formatTime(seconds) {
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            }

            function triggerCenterAnimation(svgMarkup) {
                centerStateIcon.className = 'center-state-icon'; 
                centerStateIcon.innerHTML = `<svg width="40" height="40" fill="currentColor" viewBox="0 0 24 24">${svgMarkup}</svg>`;
                void centerStateIcon.offsetWidth; 
                centerStateIcon.classList.add('animate');
            }

            function eksekusiTogglePlay() {
                if (activePlayer.paused) {
                    activePlayer.play().then(() => {
                        bottomPlayIcon.innerHTML = pauseSVG;
                        videoPlayerWrapper.classList.add('playing');
                        triggerCenterAnimation(pauseSVG);
                    }).catch(err => console.log("Playback diblokir."));
                } else {
                    activePlayer.pause();
                    bottomPlayIcon.innerHTML = playSVG;
                    videoPlayerWrapper.classList.remove('playing');
                    triggerCenterAnimation(playSVG);
                }
            }

            centerStateIcon.addEventListener('click', (e) => { e.stopPropagation(); eksekusiTogglePlay(); });

            volumeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (activePlayer.muted) {
                    activePlayer.muted = false; volumeIcon.innerHTML = soundOnSVG;
                } else {
                    activePlayer.muted = true; volumeIcon.innerHTML = soundMutedSVG;
                }
            });

            bottomPlayBtn.addEventListener('click', (e) => { e.stopPropagation(); eksekusiTogglePlay(); });
            
            let clickTimeout;
            playerContainer.addEventListener('click', (e) => {
                if (e.target.tagName === 'VIDEO') {
                    if (!clickTimeout) {
                        clickTimeout = setTimeout(() => {
                            clickTimeout = null; eksekusiTogglePlay();
                        }, 250);
                    }
                }
            });

            playerContainer.addEventListener('dblclick', (e) => {
                clearTimeout(clickTimeout); clickTimeout = null;
                const rect = playerContainer.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                
                if (clickX < rect.width / 2) {
                    activePlayer.currentTime = Math.max(activePlayer.currentTime - 5, 0);
                    rippleLeft.classList.remove('animate'); void rippleLeft.offsetWidth; rippleLeft.classList.add('animate');
                } else {
                    activePlayer.currentTime = Math.min(activePlayer.currentTime + 5, activePlayer.duration);
                    rippleRight.classList.remove('animate'); void rippleRight.offsetWidth; rippleRight.classList.add('animate');
                }
            });

            customFullscreenBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!document.fullscreenElement) { videoPlayerWrapper.requestFullscreen(); } 
                else { document.exitFullscreen(); }
            });

            activePlayer.addEventListener('timeupdate', () => {
                const persentase = (activePlayer.currentTime / activePlayer.duration) * 100;
                timelineProgress.style.width = `${persentase}%`;
                timeDisplay.textContent = `${formatTime(activePlayer.currentTime)} / ${formatTime(activePlayer.duration || 0)}`;
            });

            timelineContainer.addEventListener('click', (e) => {
                const rect = timelineContainer.getBoundingClientRect();
                activePlayer.currentTime = ((e.clientX - rect.left) / rect.width) * activePlayer.duration;
            });
        }

        function renderVideos(videosList) {
            relatedContainer.innerHTML = ''; 
            videosList.forEach(video => {
                const card = document.createElement('div');
                card.className = 'related-card';
                card.innerHTML = `
                    <div class="related-thumb-container">
                        <img src="${video.thumbnail}" class="related-thumb">
                        <div class="related-duration">${video.duration}</div>
                    </div>
                    <div class="related-info">
                        <h4 class="related-video-title">${video.title}</h4>
                        <div class="related-meta">
                            <span>🎥 ${video.category}</span>
                            <span>•</span>
                            <span>${formatWaktuUpload(video.uploadDate)}</span>
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => { window.location.href = `playground.html?id=${video.id}`; });
                relatedContainer.appendChild(card);
            });
        }

        // Jalankan Muat Halaman Utama
        muatHalamanVideo();

        // TOMBOL DISKUSI KOMENTAR (KIRIM LANGSUNG KE FIREBASE)
        const commentInput = document.getElementById('commentInput');
        const commentForm = document.getElementById('commentForm');
        const commentCancelBtn = document.getElementById('commentCancelBtn');
        const commentSubmitBtn = document.getElementById('commentSubmitBtn');

        commentInput.addEventListener('focus', () => commentForm.classList.add('active'));
        commentCancelBtn.addEventListener('click', (e) => {
            e.stopPropagation(); commentInput.value = ''; commentForm.classList.remove('active');
        });

        commentSubmitBtn.addEventListener('click', async () => {
            const teks = commentInput.value.trim();
            if (teks !== '') {
                try {
                    // Update array komentar di Firestore secara langsung
                    const docRef = doc(db, "videos", videoId);
                    await updateDoc(docRef, {
                        comments: arrayUnion(teks)
                    });

                    // Render instan ke UI
                    const item = document.createElement('div');
                    item.className = 'comment-item';
                    item.innerHTML = `
                        <img class="comment-avatar" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80">
                        <div class="comment-content">
                            <div class="comment-user-meta"><span class="comment-username">Kamu</span><span class="comment-badge">Baru</span></div>
                            <p class="comment-text">${teks}</p>
                        </div>
                    `;
                    commentsList.insertBefore(item, commentsList.firstChild);
                    
                    const currentCount = parseInt(commentCountBadge.textContent) || 0;
                    commentCountBadge.textContent = currentCount + 1;

                    commentInput.value = ''; 
                    commentForm.classList.remove('active');
                } catch (err) {
                    console.error("Gagal mengirim komentar ke database:", err);
                }
            }
        });
    </script>

    <!-- LOGIKA INTERAKSI KONTROL NAVIGASI DRAWER & SIDEBAR UTAMA -->
    <script>
        const followBtn = document.getElementById('followBtn');
        let isFollowing = false;
        followBtn.addEventListener('click', () => {
            isFollowing = !isFollowing;
            followBtn.textContent = isFollowing ? 'Mengikuti' : 'Ikuti';
            followBtn.style.backgroundColor = isFollowing ? 'var(--accent)' : 'rgba(180, 147, 255, 0.15)';
            followBtn.style.color = isFollowing ? '#0a0712' : 'var(--accent)';
        });

        const likeBtn = document.getElementById('likeBtn');
        const dislikeBtn = document.getElementById('dislikeBtn');
        const saveCollectionBtn = document.getElementById('saveCollectionBtn');

        likeBtn.addEventListener('click', () => {
            likeBtn.classList.toggle('active');
            dislikeBtn.classList.remove('active');
        });

        dislikeBtn.addEventListener('click', () => {
            dislikeBtn.classList.toggle('active');
            likeBtn.classList.remove('active');
        });

        saveCollectionBtn.addEventListener('click', () => {
            saveCollectionBtn.classList.toggle('active');
            const teksSpan = saveCollectionBtn.querySelector('span');
            teksSpan.textContent = saveCollectionBtn.classList.contains('active') ? 'Tersimpan' : 'Simpan';
        });

        const searchToggleBtn = document.getElementById('searchToggleBtn');
        const expandableSearch = document.getElementById('expandableSearch');
        const expandingInput = document.getElementById('searchInput');
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const navDrawer = document.getElementById('navDrawer');
        const drawerOverlay = document.getElementById('drawerOverlay');

        searchToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!expandableSearch.classList.contains('active')) {
                expandableSearch.classList.add('active'); expandingInput.focus();
            } else if (expandingInput.value === '') { expandableSearch.classList.remove('active'); }
        });
        function toggleDrawer() { navDrawer.classList.toggle('active'); drawerOverlay.classList.toggle('active'); }
        menuToggleBtn.addEventListener('click', toggleDrawer);
        drawerOverlay.addEventListener('click', toggleDrawer);
    </script>
</body>
</html>
